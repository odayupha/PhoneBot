query ListAllMovies @auth(level: PUBLIC, insecureReason: "This operation is safe to expose to the public") {
  movies {
    id
    title
    releaseYear
    genres
    summary
  }
}

query GetMyMovieLists @auth(level: USER, insecureReason: "This operation is safe to expose to all logged in users.") {
  movieLists(where: {userId: {eq_expr: "auth.uid"}}) {
    id
    name
    isPublic
    createdAt
    updatedAt
    description
    movieListItems_on_movieList {
      position
      note
      movie {
        title
        releaseYear
      }
    }
  }
}

mutation CreateMyMovieList($name: String!, $isPublic: Boolean!, $description: String) @auth(level: USER, insecureReason: "This operation is safe to expose to all logged in users.") {
  movieList_insert(data: {
    userId_expr: "auth.uid",
    name: $name,
    isPublic: $isPublic,
    description: $description,
    createdAt_expr: "request.time",
    updatedAt_expr: "request.time"
  })
}

mutation AddMovieToMyList($movieListId: UUID!, $movieId: UUID!, $position: Int!, $note: String) @auth(level: USER, insecureReason: "This operation is safe to expose to all logged in users.") {
  movieListItem_insert(data: {
    movieListId: $movieListId,
    movieId: $movieId,
    position: $position,
    note: $note
  })
}